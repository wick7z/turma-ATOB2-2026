<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
      <p>Em HTML5, podemos inserir os elementos de lista a seguir. <br> 
         Passe o mouse sobre os termos para descobrir qual tag devera utilizar em cada caso.</p>

         <ul>
             <li>
             <abbr title="Use a tag &lt;p&gt;">Paragrafos</abbr>
             </li>

             <li>
                <abbr title="Use as tags &lt;h1&gt;...&lt;h6&gt;">Títulos</abbr>
             </li>

             <li>
                <abbr title="Use a tag &lt;img&gt;">Imagens</abbr>
             </li>

             <li>
                <abbr title="Use a tag &lt;abbr&gt;">Abreviações</abbr>
             </li>

             <li>
                <abbr title="Use a tag &lt;code&gt;">Código-Fonte</abbr>
             </li>

             <li>
                <abbr title="Use as tags &lt;ol&gt; e &lt;li&gt;">Listas Numericas</abbr>
             </li>

             <li>
                <abbr title="Use as tags &lt;ul&gt; e &lt;li&gt;">Listas com demarcadores</abbr>
             </li>
         </ul>
</body>
</html>
