<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Defesa Galactica</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      min-height: 100vh;
      background: linear-gradient(to bottom, #050816, #0b1026, #111a3a);
      color: #ffffff;
      display: flex;
      flex-direction: column;
    }

    header {
      text-align: center;
      padding: 30px 20px;
    }

    header h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
      color: #7dd3fc;
    }

    header p {
      color: #cbd5e1;
    }

    main {
      width: 90%;
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      gap: 20px;
    }

    section {
      background-color: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(125, 211, 252, 0.35);
      border-radius: 12px;
      padding: 20px;
    }

    h2 {
      margin-bottom: 15px;
      color: #93c5fd;
    }

    button {
      background-color: #0ea5e9;
      color: #00111f;
      border: none;
      border-radius: 8px;
      padding: 10px 16px;
      margin-right: 10px;
      margin-bottom: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background-color: #38bdf8;
    }

    section p {
      margin-bottom: 8px;
    }

    footer {
      margin-top: auto;
      text-align: center;
      padding: 20px;
      color: #94a3b8;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>Defesa Galactica</h1>
    <p>Destrua as naves inimigas e proteja a galaxia.</p>
  </header>

  <main>
    <section>
      <h2>Menu</h2>
      <button>Jogar</button>
      <button>Como Jogar</button>
    </section>

    <section>
      <h2>Placar</h2>
      <p>Pontuacao: 0</p>
      <p>Vida: 3</p>
      <p>Fase: 1</p>
    </section>
  </main>

  <footer>
    <p>Defesa Galactica</p>
    <p>Criado por Lucas</p>
  </footer>
</body>
</html>
