<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedra, Papel e Tesoura</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 0 16px;
            line-height: 1.5;
        }

        h1 {
            margin-bottom: 8px;
        }

        .botoes {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 16px 0;
        }

        button {
            padding: 10px 16px;
            font-size: 16px;
            cursor: pointer;
        }

        .painel {
            border: 1px solid #ccc;
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
        }

        .placar {
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Pedra, Papel e Tesoura</h1>
    <p>Escolha uma jogada:</p>

    <div class="botoes">
        <button onclick="jogar('pedra')">Pedra</button>
        <button onclick="jogar('papel')">Papel</button>
        <button onclick="jogar('tesoura')">Tesoura</button>
    </div>

    <div class="painel">
        <p id="escolhas">Voce: - | Computador: -</p>
        <p id="resultado">Resultado: faca sua jogada.</p>
        <p class="placar" id="placar">Placar - Voce: 0 | Computador: 0 | Empates: 0</p>
    </div>

    <script>
        let pontosJogador = 0;
        let pontosComputador = 0;
        let empates = 0;

        function jogar(escolhaJogador) {
            const opcoes = ['pedra', 'papel', 'tesoura'];
            const escolhaComputador = opcoes[Math.floor(Math.random() * 3)];

            let mensagem = '';

            if (escolhaJogador === escolhaComputador) {
                mensagem = 'Empate!';
                empates++;
            } else if (
                (escolhaJogador === 'pedra' && escolhaComputador === 'tesoura') ||
                (escolhaJogador === 'papel' && escolhaComputador === 'pedra') ||
                (escolhaJogador === 'tesoura' && escolhaComputador === 'papel')
            ) {
                mensagem = 'Voce venceu!';
                pontosJogador++;
            } else {
                mensagem = 'Computador venceu!';
                pontosComputador++;
            }

            document.getElementById('escolhas').textContent =
                'Voce: ' + escolhaJogador + ' | Computador: ' + escolhaComputador;
            document.getElementById('resultado').textContent = 'Resultado: ' + mensagem;
            document.getElementById('placar').textContent =
                'Placar - Voce: ' + pontosJogador +
                ' | Computador: ' + pontosComputador +
                ' | Empates: ' + empates;
        }
    </script>
</body>
</html>
